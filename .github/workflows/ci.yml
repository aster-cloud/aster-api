name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.claude/**'
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  checks: write

# 同一 ref 上新 push 到来时取消尚在跑的过时 CI（PR 连续 push 常见）——省算力，且过时
# 提交的绿/红没有意义。按 github.ref 分组：PR 是 refs/pull/<n>/merge（同一 PR 的连续 push
# 同组→取消旧的），push main 是 refs/heads/main。主要收益在 PR 迭代（main 上极少连续 push）。
# deploy 不设 cancel-in-progress（部署不可中途取消；过时部署由 deploy 的 stale-guard 拦，见
# deploy.yml）。
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    # 真实 PostgreSQL service，固定在 localhost:5432。部分 @QuarkusTest DB 测试
    # （AuditHashChain/Idempotency/Prisma/Timer 等）连 application.properties 的
    # 默认 ${DB_JDBC_URL:...localhost:5432}，而 PostgresTestResource 的
    # testcontainer 端口注入对它们不可靠（Flyway 早期解析时序）。提供固定 5432
    # 的 service 让这些测试稳定可用；Testcontainers 仍服务于 integrationTest。
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: aster_policy
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      # 固定 localhost:6379 Redis。用 MockProfile 的 IT（MixpanelClientIT /
      # PlanGateServiceIT 等）不走 RedisTestResource，redis 配置取
      # application.properties 默认 localhost:6379；无此 service 时它们报
      # `redis read failed: Connection refused localhost:6379` 噪声。
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      # 先检出 aster-api 本体（拿到下面的 local composite action 文件），再由该 action
      # 检出全部兄弟仓 + JDK + 发布版本目录。去重了原来逐字重复的 9×checkout + setup-java。
      - uses: actions/checkout@v7
        with:
          path: aster-api

      # PrismaDatabaseE2ETest 用独立的 aster_test 库（其 profile 指向它）。
      - name: Create aster_test database
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -c "CREATE DATABASE aster_test;" || true

      - name: Setup Aster build (siblings + JDK + version catalog)
        uses: ./aster-api/.github/actions/setup-aster-build
        with:
          cross-repo-token: ${{ secrets.CROSS_REPO_TOKEN }}

      # Testcontainers 复用：CI 内单 job 多 test class 重用容器，加速集成测试
      # 安全：CI 容器在 job 结束自动销毁，reuse 仅限 job 生命周期内
      - name: Configure Testcontainers reuse
        run: |
          mkdir -p $HOME
          cat > $HOME/.testcontainers.properties <<EOF
          testcontainers.reuse.enable=true
          checks.disable=true
          ryuk.disabled=true
          EOF

      # 预拉镜像让 Testcontainers 启动更稳；postgres:17-alpine 与 PostgresTestResource.java 一致
      - name: Pre-pull test images
        run: |
          docker pull postgres:17-alpine &
          docker pull redis:7-alpine &
          wait

      # 测试分层：先跑快测拿到反馈，再跑慢测做完整覆盖
      - name: Unit Tests (fast feedback)
        working-directory: aster-api
        run: ./gradlew test --build-cache
        env:
          TESTCONTAINERS_RYUK_DISABLED: "true"
          # 指向上面的 postgres service，让连默认 localhost:5432 的 @QuarkusTest
          # DB 测试稳定可用。integrationTest 步骤不设这些（它走 Testcontainers）。
          DB_JDBC_URL: "jdbc:postgresql://localhost:5432/aster_policy"
          DB_REACTIVE_URL: "postgresql://localhost:5432/aster_policy"
          DB_USERNAME: "postgres"
          DB_PASSWORD: "postgres"

      - name: Integration Tests (Testcontainers)
        working-directory: aster-api
        run: ./gradlew integrationTest --build-cache
        env:
          TESTCONTAINERS_RYUK_DISABLED: "true"

      # 聚合 test + integrationTest 的覆盖率，verification 在指定包上做强约束。
      # ★-x test -x integrationTest（时长优化）：jacocoTestReport dependsOn 'test'，此步是
      # 独立 gradle 调用，不排除的话 Gradle 会重跑 test（上游步骤已跑过一遍）——实测 CI 此步
      # 340s 几乎全是冗余 test 重跑。jacocoReport 只需读上游产出的 build/jacoco/*.exec，
      # 显式排除 test/integrationTest 后仅做聚合，本地实测从 340s → 1s。
      # ★fail-closed 前置（Codex 审 Medium）：-x test 依赖上游步骤已产出 exec。若上游 test
      # 因 build-cache 命中被跳过且未恢复 exec，coverage 可能用旧/空数据让门禁假过。故先断言
      # 两个 exec 存在且非空（-s），缺失即 fail，把「覆盖率门禁基于真实本次数据」变成硬约束。
      - name: Coverage Report + Verification
        working-directory: aster-api
        run: |
          test -s build/jacoco/test.exec || { echo "::error::build/jacoco/test.exec 缺失/为空——上游 Unit Tests 未产出覆盖率数据，拒绝聚合（避免门禁假过）"; exit 1; }
          test -s build/jacoco/integrationTest.exec || { echo "::error::build/jacoco/integrationTest.exec 缺失/为空——上游 Integration Tests 未产出覆盖率数据"; exit 1; }
          ./gradlew jacocoTestReport jacocoCoverageVerification -x test -x integrationTest
          test -s build/reports/jacoco/test/jacocoTestReport.xml || { echo "::error::jacoco 报告未生成"; exit 1; }

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v7
        with:
          files: aster-api/build/reports/jacoco/test/jacocoTestReport.xml
          flags: backend
          fail_ci_if_error: false
        continue-on-error: true

      - name: Build (assemble + check)
        working-directory: aster-api
        # check 已包含 integrationTest，但前面单独跑过 → 这一步主要做 assemble
        run: ./gradlew build --build-cache --parallel -x test -x integrationTest

      # Chaos tests moved to nightly.yml (see "Chaos Tests" step there).
      # Rationale: 24 chaos scenarios add ~minutes to every PR for low marginal
      # signal — they catch slow-burn regressions better when run daily on main
      # than on every push. Run locally on demand: ./gradlew testChaos

      - name: Publish JUnit Report
        if: always()
        uses: dorny/test-reporter@v3
        with:
          name: JUnit Test Results
          path: build/test-results/**/*.xml
          reporter: java-junit
          fail-on-error: false
          working-directory: aster-api
          # Aster's test suite is large (~2k JUnit cases); the default
          # full listing routinely exceeds the GitHub Checks API 65535
          # byte body limit and gets trimmed. Only list failed suites
          # and tests so the published report stays under the cap and
          # remains useful (passing cases are still in the artifact).
          list-suites: failed
          list-tests: failed
          max-annotations: 50

      # 诊断制品：组织级 Actions 存储配额是全 repo 共享的，配额耗尽时
      # upload-artifact 会硬失败（"Artifact storage quota has been hit"）并
      # 把整个 job 拖挂。test-results 仅供查阅，门禁由上面的测试步骤本身把守，
      # 故上传降级为非致命。
      - name: Upload Test Results
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: aster-api/build/test-results
