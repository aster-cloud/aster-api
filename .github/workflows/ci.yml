name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.claude/**'
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  checks: write

jobs:
  build:
    runs-on: ubuntu-latest
    # 真实 PostgreSQL service，固定在 localhost:5432。部分 @QuarkusTest DB 测试
    # （AuditHashChain/Idempotency/Prisma/Timer 等）连 application.properties 的
    # 默认 ${DB_JDBC_URL:...localhost:5432}，而 PostgresTestResource 的
    # testcontainer 端口注入对它们不可靠（Flyway 早期解析时序）。提供固定 5432
    # 的 service 让这些测试稳定可用；Testcontainers 仍服务于 integrationTest。
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: aster_policy
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      # 固定 localhost:6379 Redis。用 MockProfile 的 IT（MixpanelClientIT /
      # PlanGateServiceIT 等）不走 RedisTestResource，redis 配置取
      # application.properties 默认 localhost:6379；无此 service 时它们报
      # `redis read failed: Connection refused localhost:6379` 噪声。
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v6
        with:
          path: aster-api

      # PrismaDatabaseE2ETest 用独立的 aster_test 库（其 profile 指向它）。
      - name: Create aster_test database
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -c "CREATE DATABASE aster_test;" || true

      # 共享版本目录（aster-lang-platform，ADR 0012）。settings.gradle 导入它，
      # 且 catalog 无法通过 composite includeBuild 替换（在 settings 评估阶段解析），
      # 故必须先发布到 Maven Local。
      - uses: actions/checkout@v6
        with:
          repository: aster-cloud/aster-lang-platform
          path: aster-lang-platform
          token: ${{ secrets.CROSS_REPO_TOKEN || github.token }}

      - uses: actions/checkout@v6
        with:
          repository: aster-cloud/aster-lang-core
          path: aster-lang-core
          token: ${{ secrets.CROSS_REPO_TOKEN || github.token }}

      - uses: actions/checkout@v6
        with:
          repository: aster-cloud/aster-lang-runtime
          path: aster-lang-runtime
          token: ${{ secrets.CROSS_REPO_TOKEN || github.token }}

      - uses: actions/checkout@v6
        with:
          repository: aster-cloud/aster-lang-truffle
          path: aster-lang-truffle
          token: ${{ secrets.CROSS_REPO_TOKEN || github.token }}

      - uses: actions/checkout@v6
        with:
          repository: aster-cloud/aster-lang-validation
          path: aster-lang-validation
          token: ${{ secrets.CROSS_REPO_TOKEN || github.token }}

      # en/zh/de lexicon SPI 包源：aster-lang-locales（多模块，新坐标
      # aster-lang-locales-{en,zh,de}）。settings.gradle 的 composite includeBuild
      # 把这三个坐标替换到 locales 对应 subproject。旧独立 en/zh/de 仓已归档。
      - uses: actions/checkout@v6
        with:
          repository: aster-cloud/aster-lang-locales
          path: aster-lang-locales
          token: ${{ secrets.CROSS_REPO_TOKEN || github.token }}

      # Hindi (hi-IN) is now a standalone SPI pack (extracted from core's
      # builtins). aster-api depends on it via runtimeOnly asterLibs.hi +
      # the composite includeBuild, so its source must be present.
      - uses: actions/checkout@v6
        with:
          repository: aster-cloud/aster-lang-hi
          path: aster-lang-hi
          token: ${{ secrets.CROSS_REPO_TOKEN || github.token }}

      - uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'gradle'

      # 发布共享版本目录到 Maven Local（aster-api settings 依赖它）。
      - name: Publish version catalog to Maven Local
        working-directory: aster-lang-platform
        run: ./gradlew publishToMavenLocal

      # Testcontainers 复用：CI 内单 job 多 test class 重用容器，加速集成测试
      # 安全：CI 容器在 job 结束自动销毁，reuse 仅限 job 生命周期内
      - name: Configure Testcontainers reuse
        run: |
          mkdir -p $HOME
          cat > $HOME/.testcontainers.properties <<EOF
          testcontainers.reuse.enable=true
          checks.disable=true
          ryuk.disabled=true
          EOF

      # 预拉镜像让 Testcontainers 启动更稳；postgres:17-alpine 与 PostgresTestResource.java 一致
      - name: Pre-pull test images
        run: |
          docker pull postgres:17-alpine &
          docker pull redis:7-alpine &
          wait

      # 测试分层：先跑快测拿到反馈，再跑慢测做完整覆盖
      - name: Unit Tests (fast feedback)
        working-directory: aster-api
        run: ./gradlew test --build-cache
        env:
          TESTCONTAINERS_RYUK_DISABLED: "true"
          # 指向上面的 postgres service，让连默认 localhost:5432 的 @QuarkusTest
          # DB 测试稳定可用。integrationTest 步骤不设这些（它走 Testcontainers）。
          DB_JDBC_URL: "jdbc:postgresql://localhost:5432/aster_policy"
          DB_REACTIVE_URL: "postgresql://localhost:5432/aster_policy"
          DB_USERNAME: "postgres"
          DB_PASSWORD: "postgres"

      - name: Integration Tests (Testcontainers)
        working-directory: aster-api
        run: ./gradlew integrationTest --build-cache
        env:
          TESTCONTAINERS_RYUK_DISABLED: "true"

      # 聚合 test + integrationTest 的覆盖率，verification 在指定包上做强约束
      - name: Coverage Report + Verification
        working-directory: aster-api
        run: ./gradlew jacocoTestReport jacocoCoverageVerification

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v7
        with:
          files: aster-api/build/reports/jacoco/test/jacocoTestReport.xml
          flags: backend
          fail_ci_if_error: false
        continue-on-error: true

      - name: Build (assemble + check)
        working-directory: aster-api
        # check 已包含 integrationTest，但前面单独跑过 → 这一步主要做 assemble
        run: ./gradlew build --build-cache --parallel -x test -x integrationTest

      # Chaos tests moved to nightly.yml (see "Chaos Tests" step there).
      # Rationale: 24 chaos scenarios add ~minutes to every PR for low marginal
      # signal — they catch slow-burn regressions better when run daily on main
      # than on every push. Run locally on demand: ./gradlew testChaos

      - name: Publish JUnit Report
        if: always()
        uses: dorny/test-reporter@v3
        with:
          name: JUnit Test Results
          path: build/test-results/**/*.xml
          reporter: java-junit
          fail-on-error: false
          working-directory: aster-api
          # Aster's test suite is large (~2k JUnit cases); the default
          # full listing routinely exceeds the GitHub Checks API 65535
          # byte body limit and gets trimmed. Only list failed suites
          # and tests so the published report stays under the cap and
          # remains useful (passing cases are still in the artifact).
          list-suites: failed
          list-tests: failed
          max-annotations: 50

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: aster-api/build/test-results
