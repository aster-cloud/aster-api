name: Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.claude/**'
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          path: aster-api

      # 共享版本目录（aster-lang-platform，ADR 0012）—— settings.gradle 依赖它。
      - uses: actions/checkout@v6
        with:
          repository: aster-cloud/aster-lang-platform
          path: aster-lang-platform
          token: ${{ secrets.CROSS_REPO_TOKEN || github.token }}

      - uses: actions/checkout@v6
        with:
          repository: aster-cloud/aster-lang-core
          path: aster-lang-core
          token: ${{ secrets.CROSS_REPO_TOKEN }}

      - uses: actions/checkout@v6
        with:
          repository: aster-cloud/aster-lang-runtime
          path: aster-lang-runtime
          token: ${{ secrets.CROSS_REPO_TOKEN }}

      - uses: actions/checkout@v6
        with:
          repository: aster-cloud/aster-lang-truffle
          path: aster-lang-truffle
          token: ${{ secrets.CROSS_REPO_TOKEN }}

      - uses: actions/checkout@v6
        with:
          repository: aster-cloud/aster-lang-validation
          path: aster-lang-validation
          token: ${{ secrets.CROSS_REPO_TOKEN }}

      - uses: actions/checkout@v6
        with:
          repository: aster-cloud/aster-lang-en
          path: aster-lang-en
          token: ${{ secrets.CROSS_REPO_TOKEN }}

      - uses: actions/checkout@v6
        with:
          repository: aster-cloud/aster-lang-zh
          path: aster-lang-zh
          token: ${{ secrets.CROSS_REPO_TOKEN }}

      - uses: actions/checkout@v6
        with:
          repository: aster-cloud/aster-lang-de
          path: aster-lang-de
          token: ${{ secrets.CROSS_REPO_TOKEN }}

      - uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Publish version catalog to Maven Local
        working-directory: aster-lang-platform
        run: ./gradlew publishToMavenLocal

      # 与 ci.yml 一致的 Testcontainers 稳定化：关闭 ryuk（其 prune 操作会与
      # 并发容器清理冲突，导致 DB 测试用的 postgres 容器被回收/连不上 →
      # AuditHashChain/Idempotency/Prisma/Timer 等 DB 测试间歇性 ConnectException）。
      - name: Configure Testcontainers reuse
        run: |
          mkdir -p $HOME
          cat > $HOME/.testcontainers.properties <<EOF
          testcontainers.reuse.enable=true
          checks.disable=true
          ryuk.disabled=true
          EOF

      # 预拉镜像让 Testcontainers 启动更稳；与 PostgresTestResource.java 一致
      - name: Pre-pull test images
        run: |
          docker pull postgres:17-alpine &
          docker pull redis:7-alpine &
          wait

      - name: Build & Test
        working-directory: aster-api
        run: ./gradlew build -Dquarkus.package.jar.type=fast-jar
        env:
          TESTCONTAINERS_RYUK_DISABLED: "true"

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: quarkus-app
          path: aster-api/build/quarkus-app/
          retention-days: 1

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v6

      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: quarkus-app
          path: build/quarkus-app/

      - uses: docker/setup-qemu-action@v4

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Generate image tag
        id: meta
        run: |
          SHA=$(echo "${{ github.sha }}" | head -c 7)
          TAG="${SHA}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Image tag: ${TAG}"

      - name: Build & Push Docker Image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.jvm
          platforms: linux/arm64
          push: true
          tags: |
            wontlost/aster-api:${{ steps.meta.outputs.tag }}
            wontlost/aster-api:jvm-latest

      - name: Deploy to K3S
        env:
          KUBECONFIG_B64: ${{ secrets.KUBECONFIG_B64 }}
        run: |
          mkdir -p ~/.kube
          # Secret is stored base64-encoded to survive shell/yaml mangling of
          # multiline PEM blocks. Decode straight to file.
          echo "$KUBECONFIG_B64" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config
          # Sanity check — fail fast with a useful message if decode produced
          # something kubectl can't read.
          kubectl --kubeconfig ~/.kube/config version --client=false --request-timeout=10s
          kubectl rollout restart deployment/aster-api -n aster-cloud
          kubectl rollout status deployment/aster-api -n aster-cloud --timeout=300s
