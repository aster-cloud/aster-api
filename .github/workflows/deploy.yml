name: Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.claude/**'
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    # 真实 PostgreSQL service（固定 localhost:5432）。`./gradlew build` 含需 DB 的
    # @QuarkusTest 测试，它们连 application.properties 默认 localhost:5432；
    # PostgresTestResource 的 testcontainer 端口注入对这些测试不可靠。与 ci.yml 一致。
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: aster_policy
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DB_JDBC_URL: "jdbc:postgresql://localhost:5432/aster_policy"
      DB_REACTIVE_URL: "postgresql://localhost:5432/aster_policy"
      DB_USERNAME: "postgres"
      DB_PASSWORD: "postgres"
      TESTCONTAINERS_RYUK_DISABLED: "true"
    steps:
      - uses: actions/checkout@v6
        with:
          path: aster-api

      - name: Create aster_test database
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -c "CREATE DATABASE aster_test;" || true

      # 共享版本目录（aster-lang-platform，ADR 0012）—— settings.gradle 依赖它。
      - uses: actions/checkout@v6
        with:
          repository: aster-cloud/aster-lang-platform
          path: aster-lang-platform
          token: ${{ secrets.CROSS_REPO_TOKEN || github.token }}

      - uses: actions/checkout@v6
        with:
          repository: aster-cloud/aster-lang-core
          path: aster-lang-core
          token: ${{ secrets.CROSS_REPO_TOKEN }}

      - uses: actions/checkout@v6
        with:
          repository: aster-cloud/aster-lang-runtime
          path: aster-lang-runtime
          token: ${{ secrets.CROSS_REPO_TOKEN }}

      - uses: actions/checkout@v6
        with:
          repository: aster-cloud/aster-lang-truffle
          path: aster-lang-truffle
          token: ${{ secrets.CROSS_REPO_TOKEN }}

      - uses: actions/checkout@v6
        with:
          repository: aster-cloud/aster-lang-validation
          path: aster-lang-validation
          token: ${{ secrets.CROSS_REPO_TOKEN }}

      - uses: actions/checkout@v6
        with:
          repository: aster-cloud/aster-lang-en
          path: aster-lang-en
          token: ${{ secrets.CROSS_REPO_TOKEN }}

      - uses: actions/checkout@v6
        with:
          repository: aster-cloud/aster-lang-zh
          path: aster-lang-zh
          token: ${{ secrets.CROSS_REPO_TOKEN }}

      - uses: actions/checkout@v6
        with:
          repository: aster-cloud/aster-lang-de
          path: aster-lang-de
          token: ${{ secrets.CROSS_REPO_TOKEN }}

      - uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Publish version catalog to Maven Local
        working-directory: aster-lang-platform
        run: ./gradlew publishToMavenLocal

      # Deploy 构建只跑 unit test（已含 DB 测试，由上面的 postgres service 把关）
      # + 打包；integrationTest 的完整把关在 PR/main CI 阶段（ci.yml）。排除 IT
      # 是因为若干 timing-sensitive IT（MixpanelClientIT / PlanGateServiceIT 的异步
      # flush / circuit-breaker / socket-mock 时序测试）当前不稳，不应阻塞生产部署。
      - name: Build & Test
        working-directory: aster-api
        run: ./gradlew build -x integrationTest -Dquarkus.package.jar.type=fast-jar

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: quarkus-app
          path: aster-api/build/quarkus-app/
          retention-days: 1

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v6

      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: quarkus-app
          path: build/quarkus-app/

      - uses: docker/setup-qemu-action@v4

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Generate image tag
        id: meta
        run: |
          SHA=$(echo "${{ github.sha }}" | head -c 7)
          TAG="${SHA}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Image tag: ${TAG}"

      - name: Build & Push Docker Image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.jvm
          platforms: linux/arm64
          push: true
          tags: |
            wontlost/aster-api:${{ steps.meta.outputs.tag }}
            wontlost/aster-api:jvm-latest

      - name: Deploy to K3S
        env:
          KUBECONFIG_B64: ${{ secrets.KUBECONFIG_B64 }}
        run: |
          mkdir -p ~/.kube
          # Secret is stored base64-encoded to survive shell/yaml mangling of
          # multiline PEM blocks. Decode straight to file.
          echo "$KUBECONFIG_B64" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config
          # Sanity check — fail fast with a useful message if decode produced
          # something kubectl can't read.
          kubectl --kubeconfig ~/.kube/config version --client=false --request-timeout=10s
          kubectl rollout restart deployment/aster-api -n aster-cloud
          kubectl rollout status deployment/aster-api -n aster-cloud --timeout=300s
