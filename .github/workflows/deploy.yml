name: Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.claude/**'
      # 治理/工具配置文件不影响构建产物，无需触发部署（避免无害重部署）：
      - 'renovate.json'
      - '.github/dependabot.yml'
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    # 真实 PostgreSQL service（固定 localhost:5432）。`./gradlew build` 含需 DB 的
    # @QuarkusTest 测试，它们连 application.properties 默认 localhost:5432；
    # PostgresTestResource 的 testcontainer 端口注入对这些测试不可靠。与 ci.yml 一致。
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: aster_policy
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DB_JDBC_URL: "jdbc:postgresql://localhost:5432/aster_policy"
      DB_REACTIVE_URL: "postgresql://localhost:5432/aster_policy"
      DB_USERNAME: "postgres"
      DB_PASSWORD: "postgres"
      TESTCONTAINERS_RYUK_DISABLED: "true"
    steps:
      - uses: actions/checkout@v7
        with:
          path: aster-api

      - name: Create aster_test database
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -c "CREATE DATABASE aster_test;" || true

      # 共享版本目录（aster-lang-platform，ADR 0012）—— settings.gradle 依赖它。
      - uses: actions/checkout@v7
        with:
          repository: aster-cloud/aster-lang-platform
          path: aster-lang-platform
          token: ${{ secrets.CROSS_REPO_TOKEN || github.token }}

      - uses: actions/checkout@v7
        with:
          repository: aster-cloud/aster-lang-core
          path: aster-lang-core
          token: ${{ secrets.CROSS_REPO_TOKEN }}

      - uses: actions/checkout@v7
        with:
          repository: aster-cloud/aster-lang-runtime
          path: aster-lang-runtime
          token: ${{ secrets.CROSS_REPO_TOKEN }}

      - uses: actions/checkout@v7
        with:
          repository: aster-cloud/aster-lang-truffle
          path: aster-lang-truffle
          token: ${{ secrets.CROSS_REPO_TOKEN }}

      - uses: actions/checkout@v7
        with:
          repository: aster-cloud/aster-lang-validation
          path: aster-lang-validation
          token: ${{ secrets.CROSS_REPO_TOKEN }}

      # en/zh/de lexicon SPI 包源：aster-lang-locales（新坐标，composite includeBuild）。
      # 旧独立 en/zh/de 仓已归档。
      - uses: actions/checkout@v7
        with:
          repository: aster-cloud/aster-lang-locales
          path: aster-lang-locales
          token: ${{ secrets.CROSS_REPO_TOKEN }}

      # Hindi SPI pack (extracted from core builtins) — composite includeBuild.
      - uses: actions/checkout@v7
        with:
          repository: aster-cloud/aster-lang-hi
          path: aster-lang-hi
          token: ${{ secrets.CROSS_REPO_TOKEN }}

      - uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Publish version catalog to Maven Local
        working-directory: aster-lang-platform
        run: ./gradlew publishToMavenLocal

      # 恢复完整 build（含 integrationTest）：之前排除 IT 是因 MixpanelClientIT /
      # PlanGateServiceIT 的 mock 端口跨 classloader 不一致导致 flaky；该根因已修
      # （System property 缓存端口）+ 上面加了 redis service，IT 现已稳定，可重新
      # 作为生产部署的完整把关。
      - name: Build & Test
        working-directory: aster-api
        run: ./gradlew build -Dquarkus.package.jar.type=fast-jar

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: quarkus-app
          path: aster-api/build/quarkus-app/
          retention-days: 1

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    environment: production
    permissions:
      # 红队 P2-G：cosign keyless 签名需要 OIDC token（把签名绑定到本 CI 的
      # GitHub Actions 身份 = repo+workflow）。攻击者即便攻破 DockerHub 推入
      # 投毒镜像，也无法在没有本 CI OIDC 身份的情况下产出通过校验的签名。
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v7

      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: quarkus-app
          path: build/quarkus-app/

      - uses: docker/setup-qemu-action@v4

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Generate image tag
        id: meta
        run: |
          SHA=$(echo "${{ github.sha }}" | head -c 7)
          TAG="${SHA}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Image tag: ${TAG}"

      - name: Build & Push Docker Image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.jvm
          platforms: linux/arm64
          push: true
          tags: |
            wontlost/aster-api:${{ steps.meta.outputs.tag }}
            wontlost/aster-api:jvm-latest

      # 红队 P2-G（Codex 审查后修正）：供应链加固全链锁**同一 by-digest 引用**。
      # build-push-action 输出刚构建镜像的不可变 digest。sign / verify / rollout 全用
      # 这个 digest，而不是浮动 tag jvm-latest。修掉 Codex 抓的两个绕过：
      #   (1) TOCTOU：verify jvm-latest 通过后、K8s 拉取前，tag 仍可被替换 → 现在部署
      #       直接下发 @sha256:<digest>，不再让 K8s 解析浮动 tag。
      #   (2) signed-rollback：verify 浮动 tag 只要求"本 workflow 签过"→ 攻击者把
      #       jvm-latest 指向任意历史上本 workflow 签过的旧 digest 也通过 → 现在只
      #       verify + 部署"本次刚构建"的 digest，历史 digest 不进入本次 rollout。
      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign pushed image digest (keyless)
        env:
          COSIGN_YES: "true"
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          test -n "${DIGEST}" || { echo "build 未输出 digest，中止"; exit 1; }
          # signer 身份 = 本 CI 的 OIDC（Fulcio 证书 + Rekor 透明日志）。
          cosign sign "wontlost/aster-api@${DIGEST}"
          echo "signed digest=${DIGEST}"

      # 部署前校验**本次刚构建的 digest**（非浮动 tag）带一份由本仓库本 workflow 签发的
      # cosign 签名。fail-closed：任何签名/身份不符 → verify 失败 → 部署中止。
      - name: Verify freshly-built digest signature
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          cosign verify "wontlost/aster-api@${DIGEST}" \
            --certificate-identity-regexp "^https://github.com/${GITHUB_REPOSITORY}/\.github/workflows/deploy\.yml@refs/heads/main$" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com"

      - name: Deploy to K3S
        env:
          KUBECONFIG_B64: ${{ secrets.KUBECONFIG_B64 }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          mkdir -p ~/.kube
          # Secret is stored base64-encoded to survive shell/yaml mangling of
          # multiline PEM blocks. Decode straight to file.
          echo "$KUBECONFIG_B64" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config
          # Sanity check — fail fast with a useful message if decode produced
          # something kubectl can't read.
          kubectl --kubeconfig ~/.kube/config version --client=false --request-timeout=10s
          # 部署用 `rollout restart`（非 `set image @digest`）。原因（红队 P2-G 上线实测教训）：
          # 本集群由 **ArgoCD** 管理，deployment.spec 的 image 字段被对账回 git manifest 的
          # 浮动 tag `jvm-latest`——`kubectl set image @digest` 会被 ArgoCD 立即还原，新副本集
          # 被缩到 0，pod 从不真正切到新 digest（实测：set image 后运行 pod 仍是旧 digest）。
          # `rollout restart` 触发 pod 重建，配合 `imagePullPolicy: Always` 重新拉取 jvm-latest，
          # 而 CI 本步刚把 jvm-latest 指向本次构建并**已 cosign 验签**的 digest ${DIGEST}，
          # 所以重启后的 pod = 已验签内容。供应链保证来自上一步的 verify（对 by-digest 引用），
          # 不依赖部署方式。长期 pin（把 digest 写进 ArgoCD git 源）是部署模型变更，本轮不做。
          echo "verified digest to be rolled out via jvm-latest: ${DIGEST}"
          kubectl rollout restart deployment/aster-api -n aster-cloud
          kubectl rollout status deployment/aster-api -n aster-cloud --timeout=300s
