name: Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.claude/**'

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: aster-api

      - uses: actions/checkout@v4
        with:
          repository: aster-cloud/aster-lang-core
          path: aster-lang-core
          token: ${{ secrets.CROSS_REPO_TOKEN }}

      - uses: actions/checkout@v4
        with:
          repository: aster-cloud/aster-lang-runtime
          path: aster-lang-runtime
          token: ${{ secrets.CROSS_REPO_TOKEN }}

      - uses: actions/checkout@v4
        with:
          repository: aster-cloud/aster-lang-truffle
          path: aster-lang-truffle
          token: ${{ secrets.CROSS_REPO_TOKEN }}

      - uses: actions/checkout@v4
        with:
          repository: aster-cloud/aster-lang-validation
          path: aster-lang-validation
          token: ${{ secrets.CROSS_REPO_TOKEN }}

      - uses: actions/checkout@v4
        with:
          repository: aster-cloud/aster-lang-en
          path: aster-lang-en
          token: ${{ secrets.CROSS_REPO_TOKEN }}

      - uses: actions/checkout@v4
        with:
          repository: aster-cloud/aster-lang-zh
          path: aster-lang-zh
          token: ${{ secrets.CROSS_REPO_TOKEN }}

      - uses: actions/checkout@v4
        with:
          repository: aster-cloud/aster-lang-de
          path: aster-lang-de
          token: ${{ secrets.CROSS_REPO_TOKEN }}

      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Build & Test
        working-directory: aster-api
        run: ./gradlew build -Dquarkus.package.jar.type=fast-jar

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: quarkus-app
          path: aster-api/build/quarkus-app/
          retention-days: 1

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: quarkus-app
          path: build/quarkus-app/

      - name: Build & Push Docker Image
        run: |
          docker build -f Dockerfile.jvm -t wontlost/aster-api:${{ github.sha }} .
          docker tag wontlost/aster-api:${{ github.sha }} wontlost/aster-api:latest
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
          docker push wontlost/aster-api:${{ github.sha }}
          docker push wontlost/aster-api:latest

      - name: Deploy to K3S
        run: |
          mkdir -p ~/.kube
          printf '%s' "${{ secrets.KUBECONFIG }}" > ~/.kube/config
          kubectl set image deployment/aster-api \
            aster-api=wontlost/aster-api:${{ github.sha }} \
            -n aster-cloud
          kubectl rollout status deployment/aster-api -n aster-cloud --timeout=300s
