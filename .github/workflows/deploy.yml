name: Deploy

on:
  push:
    branches: [main]
    # 不设 paths-ignore（Codex 交叉审 High）：deploy 用「github.sha == origin/main tip」做
    # stale-guard 防过时部署，其正确性前提是「每个 main commit 都有自己的 deploy run 接手」。
    # 若这里 paths-ignore 掉 docs/治理提交，会出现死角：代码提交 A 触发 deploy，随后 docs-only
    # 提交 B 前进 main 但**不**触发 deploy → A 的 guard 看到 tip=B 判自己过时而跳过，B 又没有
    # run 接手 → A 的代码永不上线。让每个 commit 都触发 deploy，docs-only 提交会正常成为 tip
    # 并无害地重部署（rollout restart 幂等）。省"无害重部署"的收益不值这个正确性死角。
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    # 真实 PostgreSQL service（固定 localhost:5432）。`./gradlew build` 含需 DB 的
    # @QuarkusTest 测试，它们连 application.properties 默认 localhost:5432；
    # PostgresTestResource 的 testcontainer 端口注入对这些测试不可靠。与 ci.yml 一致。
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: aster_policy
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DB_JDBC_URL: "jdbc:postgresql://localhost:5432/aster_policy"
      DB_REACTIVE_URL: "postgresql://localhost:5432/aster_policy"
      DB_USERNAME: "postgres"
      DB_PASSWORD: "postgres"
      TESTCONTAINERS_RYUK_DISABLED: "true"
    steps:
      - uses: actions/checkout@v7
        with:
          path: aster-api

      - name: Create aster_test database
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -c "CREATE DATABASE aster_test;" || true

      - name: Setup Aster build (siblings + JDK + version catalog)
        uses: ./aster-api/.github/actions/setup-aster-build
        with:
          cross-repo-token: ${{ secrets.CROSS_REPO_TOKEN }}
          # 部署链路 fail-closed：凭据缺失即失败，不静默回退 github.token。
          require-cross-repo-token: "true"

      # 恢复完整 build（含 integrationTest）：之前排除 IT 是因 MixpanelClientIT /
      # PlanGateServiceIT 的 mock 端口跨 classloader 不一致导致 flaky；该根因已修
      # （System property 缓存端口）+ 上面加了 redis service，IT 现已稳定，可重新
      # 作为生产部署的完整把关。
      - name: Build & Test
        working-directory: aster-api
        run: ./gradlew build -Dquarkus.package.jar.type=fast-jar

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: quarkus-app
          path: aster-api/build/quarkus-app/
          retention-days: 1

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    environment: production
    permissions:
      # 红队 P2-G：cosign keyless 签名需要 OIDC token（把签名绑定到本 CI 的
      # GitHub Actions 身份 = repo+workflow）。攻击者即便攻破 DockerHub 推入
      # 投毒镜像，也无法在没有本 CI OIDC 身份的情况下产出通过校验的签名。
      id-token: write
      contents: read
    # digest-pin Phase 2：把已验签 digest + 是否过时 暴露给下游 image-pin-pr job。
    outputs:
      digest: ${{ steps.build.outputs.digest }}
      stale: ${{ steps.staleguard.outputs.stale }}
    steps:
      - uses: actions/checkout@v7

      # Stale-commit guard（Codex 交叉审两轮定稿）：部署是不可逆动作（push 镜像 + rollout），
      # 且 deploy 的 concurrency 不 cancel 正在跑的 run。若 build-and-test 期间 main 又前进了，
      # 本次携带的已是过时提交——继续部署会把旧代码推上生产、覆盖更新的部署。
      #
      # 关键设计（吸取第一轮并行 stale-check 的教训）：guard 必须在**push 镜像的紧前一刻**取
      # 远端 tip，而不能用 workflow 开头的快照——否则 build 期间 main 前进就漏判。用 git
      # ls-remote 直接问远端（不依赖本地 refs/remotes 是否被 fetch 刷新，最可靠）。
      # 仅 push 事件把关；workflow_dispatch 手动部署允许部署任意点。
      - name: Stale-commit guard (skip push+deploy if main moved ahead)
        id: staleguard
        run: |
          if [ "${{ github.event_name }}" != "push" ]; then
            echo "非 push 事件（${{ github.event_name }}），跳过 stale 闸门。"
            echo "stale=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          REMOTE_TIP=$(git ls-remote origin refs/heads/main | cut -f1)
          echo "this run sha:    ${GITHUB_SHA}"
          echo "origin/main tip: ${REMOTE_TIP}"
          if [ -z "${REMOTE_TIP}" ]; then
            echo "::error::无法解析 origin/main tip（git ls-remote 返回空）——为安全起见按过时处理，不部署。"
            echo "stale=true" >> "$GITHUB_OUTPUT"
            echo "⚠️ **部署已跳过**：无法解析 origin/main tip，按过时处理（fail-safe）。" >> "$GITHUB_STEP_SUMMARY"
          elif [ "${GITHUB_SHA}" != "${REMOTE_TIP}" ]; then
            echo "::warning::main 已前进到 ${REMOTE_TIP}，本次 ${GITHUB_SHA} 已过时——跳过 push+部署，交由更新的 run 处理。"
            echo "stale=true" >> "$GITHUB_OUTPUT"
            # 运维可观测性：job 会显示成功但实际未部署，在 summary 里显式说明原因（Codex 审 Low）。
            echo "⏭️ **部署已跳过（过时提交）**：本次 \`${GITHUB_SHA}\` 已非 main tip（现为 \`${REMOTE_TIP}\`），由更新的 deploy run 接手。" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "stale=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download build artifact
        if: ${{ steps.staleguard.outputs.stale != 'true' }}
        uses: actions/download-artifact@v8
        with:
          name: quarkus-app
          path: build/quarkus-app/

      - if: ${{ steps.staleguard.outputs.stale != 'true' }}
        uses: docker/setup-qemu-action@v4

      - if: ${{ steps.staleguard.outputs.stale != 'true' }}
        uses: docker/setup-buildx-action@v4

      - if: ${{ steps.staleguard.outputs.stale != 'true' }}
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Generate image tag
        id: meta
        if: ${{ steps.staleguard.outputs.stale != 'true' }}
        run: |
          SHA=$(echo "${{ github.sha }}" | head -c 7)
          TAG="${SHA}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Image tag: ${TAG}"

      - name: Build & Push Docker Image
        id: build
        if: ${{ steps.staleguard.outputs.stale != 'true' }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.jvm
          platforms: linux/arm64
          # ★运行时构建标识（S0 / m1.5 层1）：把产出该镜像的 github.sha 烘进镜像 ENV ASTER_RUNTIME_BUILD
          # → toolchainId 的 build= 段变真值（原 dev）。值与镜像同源、不 drift；不碰 k3s/image-pin/bot 边界。
          build-args: |
            ASTER_RUNTIME_BUILD=${{ github.sha }}
          push: true
          # pull:true 每次重拉 base，避免复用过期/错误架构的 base 解析结果（Codex 建议）。
          pull: true
          # provenance:false 去掉 build-push-action 默认加的 provenance attestation manifest
          # （platform=unknown/unknown 条目）。某些 containerd/k3s 版本会误选它 exec，且单平台
          # 镜像不需要 attestation 索引；去掉让 manifest 干净、诊断不被 unknown 条目干扰。
          # ★注意：provenance:false 只清 manifest，**不保证 rootfs 是 arm64**——真正的架构约束
          # 来自 Dockerfile 构建期 `RUN uname -m` 断言 + 下面 push 后 verifier（Codex 复审）。
          provenance: false
          sbom: false
          tags: |
            wontlost/aster-api:${{ steps.meta.outputs.tag }}
            wontlost/aster-api:jvm-latest

      # ★arm64 内容校验（2026-07-15 加）：集群节点是 ARM64（VM.Standard.A1.Flex Ampere），
      # 但曾发生 build-push-action + QEMU 产出**内容是 amd64 却标 arm64** 的镜像 → 节点
      # `exec /bin/sh: exec format error` → CrashLoopBackOff → rollout 卡「progress deadline」。
      # manifest 的 architecture 字段会撒谎（标 arm64），故拉真实 arm64 变体在其内 `uname -m`
      # 必须 aarch64，否则**构建即失败**，杜绝 mislabeled 镜像上生产（补上 pipeline 缺的 arch verifier）。
      - name: Verify pushed image is genuinely arm64
        if: ${{ steps.staleguard.outputs.stale != 'true' }}
        run: |
          set -euo pipefail
          DIGEST='${{ steps.build.outputs.digest }}'
          # ★先静默 pull，避免 docker run 的 "Pulling from ..." 进度污染 uname 输出捕获
          # （之前 2>&1 把 pull 进度混进 $PRE 导致误判 preflight 失败）。pull 出 stdout 丢弃。
          docker pull -q --platform linux/arm64 alpine:latest >/dev/null 2>&1 || true
          docker pull -q --platform linux/arm64 "wontlost/aster-api@${DIGEST}" >/dev/null 2>&1 || true
          # arch 捕获：只取 uname 的 **stdout 最后一行**（2>/dev/null 丢 stderr，tail -n1 防残留）。
          runcmd() { docker run --rm --platform linux/arm64 "$1" sh -c 'uname -m' 2>/dev/null | tail -n1 | tr -d '[:space:]'; }
          # preflight：runner 的 QEMU/binfmt 能否模拟 arm64（否则真 arm64 镜像也跑不起来，
          # 会误判成镜像坏）。preflight 失败=CI 环境问题（binfmt 未注册），非镜像 arch 问题。
          PRE="$(runcmd alpine:latest || true)"
          case "$PRE" in
            aarch64|arm64) echo "preflight OK: runner 可模拟 arm64 ($PRE)" ;;
            *) echo "::error title=qemu preflight failed::runner QEMU/binfmt 未能模拟 arm64（alpine uname='$PRE'）。CI 环境问题非镜像问题。"; exit 1 ;;
          esac
          echo "Verifying wontlost/aster-api@${DIGEST} is real arm64…"
          ARCH="$(runcmd "wontlost/aster-api@${DIGEST}" || true)"
          echo "in-image uname -m = '${ARCH}'"
          case "${ARCH}" in
            aarch64|arm64) echo "✓ genuine arm64" ;;
            *) echo "::error title=arch mismatch::pushed image 标 arm64 但内容是 '${ARCH}'（非 aarch64）。QEMU 跨构建产出 mislabeled 镜像，禁止上生产。"; exit 1 ;;
          esac

      # 红队 P2-G：sign / verify 均对 build-push-action 输出的**不可变 digest** 做（非浮动
      # tag），把签名身份绑定到本 workflow 的 OIDC。这消除了 verify 阶段的 signed-rollback：
      # 只签验"本次刚构建"的 digest，历史 digest 不进入验签。
      #
      # ⚠️ 已知遗留（TOCTOU，本轮不修，Codex 交叉审确认）：verify 对 digest 成立，但最终
      # 下面的 `rollout restart` 让集群按 **浮动 tag jvm-latest** 重新拉取（因 ArgoCD 对账把
      # image 字段还原成 git manifest 的 jvm-latest，`set image @digest` 会被立即回滚——见
      # Deploy 步骤注释）。故 verify(digest) 与 pull(jvm-latest) 之间存在窗口：tag 可被替换，
      # 或指向历史签过的 digest。真正闭合需 GitOps 侧按 digest pin（把 @sha256 写进 ArgoCD
      # git 源）或集群 admission 按签名校验——那是部署模型变更，应单独立项，不在本次 workflow
      # 优化范围内。当前注释如实描述现状，不再声称"全链 by-digest"。
      - name: Install cosign
        if: ${{ steps.staleguard.outputs.stale != 'true' }}
        uses: sigstore/cosign-installer@v3

      - name: Sign pushed image digest (keyless)
        if: ${{ steps.staleguard.outputs.stale != 'true' }}
        env:
          COSIGN_YES: "true"
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          test -n "${DIGEST}" || { echo "build 未输出 digest，中止"; exit 1; }
          # signer 身份 = 本 CI 的 OIDC（Fulcio 证书 + Rekor 透明日志）。
          cosign sign "wontlost/aster-api@${DIGEST}"
          echo "signed digest=${DIGEST}"

      # 部署前校验**本次刚构建的 digest**（非浮动 tag）带一份由本仓库本 workflow 签发的
      # cosign 签名。fail-closed：任何签名/身份不符 → verify 失败 → 部署中止。
      - name: Verify freshly-built digest signature
        if: ${{ steps.staleguard.outputs.stale != 'true' }}
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          cosign verify "wontlost/aster-api@${DIGEST}" \
            --certificate-identity-regexp "^https://github.com/${GITHUB_REPOSITORY}/\.github/workflows/deploy\.yml@refs/heads/main$" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com"

      # ── Phase 3 P3-2a：已移除 `Deploy to K3S`（kubectl rollout restart）发布语义 ──
      # 统一 digest pin 全链上线后，发布真相 = image-pin-pr job 开 PR 改 k3s image-lock +
      # kustomization digest → verify-image-pin 验签 → auto-merge → ArgoCD by-digest sync →
      # 滚动更新。旧的 rollout restart 在 P3-0（kustomize 渲染 @digest）后已**不再是有效发布
      # 通道**（deployment.spec 已是 @digest，restart 只重启当前 digest、不部署新 tag），故删除。
      #
      # ⚠️ 本 job（build+sign+verify）**不再直接部署**——它只产出已验签 digest 供下游 image-pin-pr
      # 使用。若 image-pin-pr 失败 = 新版本不上线（fail-closed，可见：该 job 会红）。
      # 回滚：git revert 本 commit 恢复 rollout restart（但注意：需配合 ArgoCD 侧才能真回旧 tag 发布）。

  # ── 统一 digest pin 设计 A′ Phase 2：CI 开 PR 到 k3s 改 image-lock ──────────────
  # 见 wontlost-ltd/k3s#4、k3s .github/image-pin/。独立 job：fail-loud 但**不阻塞**上面
  # 既有 rollout 发布路径（Phase 2 期间两条路径并存，Phase 3 再移除 rollout 发布语义）。
  # ⚠️ 暂态（如实标注）：image-lock PR 合并后 ArgoCD 按 digest sync 一次 + 上面 rollout 一次
  # ＝同一 digest 可能多一次滚动更新，结果一致（幂等），非安全冲突。
  #
  # 前置（人工，见 k3s SETUP.md）：本仓需配 vars.IMAGE_PIN_APP_ID +
  # secrets.IMAGE_PIN_APP_PRIVATE_KEY（image-pin App id 4253193 的私钥）。未配置则本 job skip。
  image-pin-pr:
    needs: deploy
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.deploy.outputs.stale != 'true' && vars.IMAGE_PIN_APP_ID != '' }}
    runs-on: ubuntu-latest
    concurrency:
      group: image-pin-pr-aster-api        # per-image：不与 aster-cloud 的 job 互相取消
      cancel-in-progress: true
    steps:
      - name: Final stale gate (再确认 github.sha 仍是 origin/main tip)
        run: |
          set -euo pipefail
          # 减少 k3s 端 freshness fail-closed 噪音：开 PR 前再查一次，已过时则不开（下次 push 重建）。
          tip="$(git ls-remote https://github.com/${{ github.repository }}.git refs/heads/main | cut -f1)"
          echo "this run: ${GITHUB_SHA}  origin/main tip: ${tip}"
          if [ "${GITHUB_SHA}" != "${tip}" ]; then
            echo "::notice::main 已前进，本 run 过时 → 跳过 image-pin PR（下次 push 重建固定分支）"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi
        id: stalegate

      - name: Mint k3s-scoped token (跨 org：App 装在 wontlost-ltd/k3s)
        if: ${{ steps.stalegate.outputs.skip != 'true' }}
        id: k3stoken
        uses: actions/create-github-app-token@v3.2.0
        with:
          # client-id 取代已弃用的 app-id（create-github-app-token@v3 弃用警告）。
          client-id: ${{ vars.IMAGE_PIN_APP_CLIENT_ID }}
          private-key: ${{ secrets.IMAGE_PIN_APP_PRIVATE_KEY }}
          owner: wontlost-ltd
          repositories: k3s
          permission-contents: write
          permission-pull-requests: write

      # checkout 本仓以取用共享脚本（image-pin-pr 是独立 job，需自己 checkout）。
      - name: Checkout (for shared script)
        if: ${{ steps.stalegate.outputs.skip != 'true' }}
        uses: actions/checkout@v7

      - name: Open/update image-pin PR to k3s
        if: ${{ steps.stalegate.outputs.skip != 'true' }}
        env:
          GH_TOKEN: ${{ steps.k3stoken.outputs.token }}
          DIGEST: ${{ needs.deploy.outputs.digest }}
          SOURCE_SHA: ${{ github.sha }}
          RUN_ID: ${{ github.run_id }}
        run: |
          bash scripts/ci/open-image-pin-pr.sh \
            docker.io/wontlost/aster-api image-pin/aster-api
