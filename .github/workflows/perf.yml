name: Nightly perf benchmark (k6)

# P0-3: 在 GH runner 内启动 aster-api + PG，跑 k6 对 evaluate-source 做基线
# 阈值：P95 < 200ms, P99 < 500ms, 5xx error rate < 0.1%
#
# 设计权衡：不在 k3s 部署独立 perf-env（资源不足、维护复杂）。
# runner 内启动可重复性好、隔离彻底，缺点是绝对数字与生产不同——用作回归检测。

on:
  schedule:
    - cron: '0 4 * * *'   # UTC 04:00, 紧接 nightly IT
  workflow_dispatch:

permissions:
  contents: read

jobs:
  k6:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: aster_perf
          POSTGRES_USER: aster
          POSTGRES_PASSWORD: aster
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U aster -d aster_perf"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v7
        with: { path: aster-api }

      # 共享版本目录（aster-lang-platform，ADR 0012）—— settings.gradle 依赖它。
      - uses: actions/checkout@v7
        with: { repository: aster-cloud/aster-lang-platform, path: aster-lang-platform, token: '${{ secrets.CROSS_REPO_TOKEN || github.token }}' }

      # 子模块仓库（与 nightly.yml 一致）
      - uses: actions/checkout@v7
        with: { repository: aster-cloud/aster-lang-core, path: aster-lang-core, token: '${{ secrets.CROSS_REPO_TOKEN }}' }
      - uses: actions/checkout@v7
        with: { repository: aster-cloud/aster-lang-runtime, path: aster-lang-runtime, token: '${{ secrets.CROSS_REPO_TOKEN }}' }
      - uses: actions/checkout@v7
        with: { repository: aster-cloud/aster-lang-truffle, path: aster-lang-truffle, token: '${{ secrets.CROSS_REPO_TOKEN }}' }
      - uses: actions/checkout@v7
        with: { repository: aster-cloud/aster-lang-validation, path: aster-lang-validation, token: '${{ secrets.CROSS_REPO_TOKEN }}' }
      # en/zh/de lexicon SPI 包源：aster-lang-locales（新坐标，composite includeBuild）。
      - uses: actions/checkout@v7
        with: { repository: aster-cloud/aster-lang-locales, path: aster-lang-locales, token: '${{ secrets.CROSS_REPO_TOKEN }}' }
      - uses: actions/checkout@v7
        with: { repository: aster-cloud/aster-lang-hi, path: aster-lang-hi, token: '${{ secrets.CROSS_REPO_TOKEN }}' }

      - uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Publish version catalog to Maven Local
        working-directory: aster-lang-platform
        run: ./gradlew publishToMavenLocal

      - name: Build aster-api jar
        working-directory: aster-api
        run: ./gradlew quarkusBuild -x test --no-daemon

      - name: Start aster-api in background
        working-directory: aster-api
        env:
          ASTER_SECURITY_SIGNATURE_ENABLED: "false"
          ASTER_SECURITY_RBAC_ENABLED: "false"
          # /evaluate prod path goes through ApiKeyAuthFilter which 401s
          # without a Bearer token; evaluate.js intentionally has no API
          # key (perf isolates latency from auth costs). Disable for perf
          # bench. evaluate.js docstring already documents this requirement
          # but the workflow forgot to set it — caused 5/26 onwards Nightly
          # perf benchmark 100% error-rate failures.
          ASTER_SECURITY_APIKEY_ENABLED: "false"
          # The endpoint is gated by InternalCallerFilter (HMAC) and by
          # RateLimitFilter (60 req / 60s per IP). Both block perf load
          # from the runner — bypass for the duration of the benchmark.
          ASTER_SECURITY_EVALUATE_SOURCE_PUBLIC: "true"
          ASTER_RATELIMIT_ENABLED: "false"
          QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://localhost:5432/aster_perf
          # application.properties wires the reactive datasource separately
          # (defaults to localhost:5432/aster_policy). Without this override
          # the reactive PG health check fails ("database aster_policy does
          # not exist") and /q/health stays 503 → ready loop times out at 2min.
          QUARKUS_DATASOURCE_REACTIVE_URL: postgresql://localhost:5432/aster_perf
          QUARKUS_DATASOURCE_USERNAME: aster
          QUARKUS_DATASOURCE_PASSWORD: aster
          QUARKUS_REDIS_HOSTS: redis://localhost:6379
          QUARKUS_HTTP_PORT: "8080"
          # 禁用所有遥测/外部依赖，缩减启动时间
          OTEL_TRACES_EXPORTER: "none"
          # quarkus.otel.enabled is a build-time property; setting it via env
          # at runtime is a no-op (and the app logs a build-time-fixed warning).
          # Otel exporter set to none above already disables exports — leave
          # the build-time value alone.
        run: |
          nohup java -jar build/quarkus-app/quarkus-run.jar > aster-api.log 2>&1 &
          echo "PID=$!"
          # 健康检查 wait. /q/health/ready is the liveness/readiness composite
          # but the perf jar boots ~30s; give 3min (was 2min, too tight on
          # cold runner) before declaring failure.
          for i in $(seq 1 90); do
            if curl -fsS http://localhost:8080/q/health >/dev/null 2>&1; then
              echo "aster-api ready after ${i}×2s"
              exit 0
            fi
            sleep 2
          done
          echo "::error::aster-api failed to start within 180s"
          echo "::group::aster-api.log (tail 200)"
          tail -200 aster-api.log
          echo "::endgroup::"
          exit 1

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
            --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install -y k6

      - name: Run evaluate-source baseline
        working-directory: aster-api/perf
        env:
          API_BASE: http://localhost:8080
          TENANT_ID: perf-tenant
        run: |
          k6 run --summary-export=policy-eval.json evaluate-source.js \
            || { echo "::error::P0-3 perf threshold breached (evaluate-source)"; exit 1; }

      # Seed the perf policy used by evaluate.js — a trivial zero-arg
      # CNL rule returning 42. /evaluate requires the policy to exist
      # in policy_versions + policy_catalog before it can hit the
      # compiled-policy cache (which is what makes /evaluate fast vs
      # /evaluate-source's per-call compile path).
      - name: Seed perf policy (loadtest.zero.compute)
        env:
          PGPASSWORD: aster
        run: |
          psql -h localhost -U aster -d aster_perf <<'SQL'
          INSERT INTO policy_versions (
            policy_id, version, module_name, function_name, content, active,
            created_at, source_hash, tenant_id, status, is_default
          ) VALUES (
            'perf-zero', 1, 'loadtest.zero', 'compute',
            E'Module loadtest.zero.\n\nRule compute, produce Int:\n  Return 42.',
            true, NOW(),
            'zerohash00000000000000000000000000000000000000000000000000000000',
            'perf-tenant', 'APPROVED', true
          ) ON CONFLICT DO NOTHING;

          INSERT INTO policy_catalog (
            id, tenant_id, module_name, function_name, default_version_id,
            created_at, updated_at
          )
          SELECT gen_random_uuid(), 'perf-tenant', 'loadtest.zero', 'compute',
                 (SELECT id FROM policy_versions WHERE module_name='loadtest.zero' LIMIT 1),
                 NOW(), NOW()
          WHERE NOT EXISTS (
            SELECT 1 FROM policy_catalog
            WHERE tenant_id='perf-tenant' AND module_name='loadtest.zero'
          );
          SQL

      - name: Run /evaluate baseline (DB-backed prod path)
        working-directory: aster-api/perf
        env:
          API_BASE: http://localhost:8080
          TENANT_ID: perf-tenant
        run: |
          k6 run --summary-export=evaluate.json evaluate.js \
            || { echo "::error::Perf threshold breached (/evaluate)"; exit 1; }

      - name: Upload k6 summaries + aster-api log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: k6-perf-${{ github.run_id }}
          path: |
            aster-api/perf/policy-eval.json
            aster-api/perf/policy-eval-summary.json
            aster-api/perf/evaluate.json
            aster-api/perf/evaluate-summary.json
            aster-api/aster-api.log

      - name: Notify Slack on failure
        if: failure()
        run: |
          if [ -z "$SLACK_WEBHOOK" ]; then
            echo "SLACK_WEBHOOK not set; skipping notification"
            exit 0
          fi
          curl -X POST -H 'Content-Type: application/json' \
            -d "{\"text\":\":warning: aster-api perf benchmark FAILED (run ${{ github.run_id }})\nP95 ≥ 200ms or P99 ≥ 500ms or error rate > 0.1%. See artifacts.\"}" \
            "$SLACK_WEBHOOK"
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_PERF_WEBHOOK }}
