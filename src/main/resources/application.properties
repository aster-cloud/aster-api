# encoding: UTF-8
# This file is encoded in UTF-8 to support Chinese comments
quarkus.application.name=aster-policy-api
quarkus.http.port=8080
quarkus.locales=zh-CN,en-US
quarkus.default-locale=zh-CN
# 全局 HTTP 请求体硬上限（默认 Quarkus 是 10MB）。策略评估/编译类请求体普遍
# 远小于此；1MB 给批量/大 context 留足空间，同时把超大 body 在 HTTP 层直接
# 拒绝，作为字段级 @Size 之外的兜底，收敛输入型 DoS 面。可经环境变量覆盖。
quarkus.http.limits.max-body-size=${ASTER_HTTP_MAX_BODY_SIZE:1M}

quarkus.smallrye-openapi.path=/openapi
quarkus.swagger-ui.always-include=false
quarkus.swagger-ui.path=/swagger-ui

# quarkus.health.openapi.included isn't a recognized key in Quarkus 3.x;
# health endpoints are auto-included in the OpenAPI document when both
# smallrye-health and smallrye-openapi are on the classpath. The
# unrecognized-key warning is removed by dropping the line.

quarkus.micrometer.binder.http-server.enabled=true
quarkus.micrometer.export.prometheus.enabled=true

# OpenTelemetry Tracing Configuration
# 生产环境默认禁用（通过环境变量启用 OTLP 导出）
# Quarkus 3.x: 'cdi' = 使用 Quarkus 内建的 CDI-managed OTLP exporter
# （写入 quarkus.otel.exporter.otlp.endpoint）。不要用 'otlp'，那个走
# OTel SDK 的 SPI autoconfigure 路径，需要 raw opentelemetry-exporter-otlp
# jar 在 system classloader，而 Quarkus 把 lib/main/* 放在隔离 classloader
# 里 → ConfigurationException at startup。
quarkus.otel.traces.exporter=${OTEL_TRACES_EXPORTER:cdi}
quarkus.otel.exporter.otlp.endpoint=${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}
quarkus.otel.service.name=aster-policy-api
quarkus.otel.traces.sampler=${OTEL_TRACES_SAMPLER:parentbased_traceidratio}
quarkus.otel.traces.sampler.arg=${OTEL_TRACES_SAMPLER_ARG:0.1}
%dev.quarkus.otel.traces.exporter=logging
%dev.quarkus.otel.traces.sampler=always_on

# 策略结果缓存配置
# 注意：缓存键应包含策略版本哈希，以便策略更新时自动失效
# 仅使用 expire-after-write，避免与 expire-after-access 混用导致的复杂行为
quarkus.cache.caffeine."policy-results".initial-capacity=512
quarkus.cache.caffeine."policy-results".maximum-size=4096
quarkus.cache.caffeine."policy-results".expire-after-write=${CACHE_POLICY_TTL:15M}
quarkus.cache.caffeine."policy-results".metrics-enabled=true
quarkus.redis.hosts=${QUARKUS_REDIS_HOSTS:redis://localhost:6379}
quarkus.redis.max-pool-size=50
quarkus.redis.max-pool-waiting=128
quarkus.cache.redis.expire-after-write=30M
quarkus.cache.redis.prefix=policy-cache
# 修复：使用正确的缓存值类型（PolicyEvaluationResult 而非 EvaluationResponse）
quarkus.cache.redis.policy-results.value-type=io.aster.policy.api.model.PolicyEvaluationResult
quarkus.cache.redis.idempotency-keys.value-type=java.lang.String

quarkus.cache.caffeine."idempotency-keys".maximum-size=10000
quarkus.cache.caffeine."idempotency-keys".expire-after-write=1h

# Phase 3.4: 版本使用统计缓存配置
quarkus.cache.caffeine."version-usage-stats".expire-after-write=15M
quarkus.cache.caffeine."version-usage-stats".maximum-size=1000
quarkus.cache.caffeine."version-usage-stats".metrics-enabled=true

# 按 versionId 缓存策略编译结果（PolicyCompiler.compile(Long)）。
# versionId 不可变 + content 不可变 → 编译结果恒定，正确性无忧；但成功结果含完整
# Core JSON，必须设容量上限防内存无界（版本数随时间增长，匿名 /validate 也会促使
# 活跃版本进入缓存）。TTL 兜底淘汰冷版本。
quarkus.cache.caffeine."policy-compile-by-version".maximum-size=${CACHE_COMPILE_MAX:2048}
quarkus.cache.caffeine."policy-compile-by-version".expire-after-write=${CACHE_COMPILE_TTL:1h}
quarkus.cache.caffeine."policy-compile-by-version".metrics-enabled=true

quarkus.log.level=INFO
quarkus.log.category."io.aster".level=INFO
%dev.quarkus.log.category."io.aster".level=DEBUG
# 日志格式带 traceId（OTEL-2）—— 跨 cloud↔aster-api 关联日志
# Quarkus OpenTelemetry 自动写入 MDC keys: traceId / spanId / sampled
quarkus.log.console.format=%d{HH:mm:ss} %-5p [%c{2.}] (%t) traceId=%X{traceId} %s%e%n

# 运行时 PII 保护配置（生产环境默认启用）
# - aster.pii.enforce=true: 启用 PII 保护（默认）—— response 脱敏、
#   日志脱敏、audit redaction
# - aster.pii.enforce=false: 禁用运行时保护（仅开发/调试环境）
#
# 这是 aster-api **运行时**保护开关，与 typecheck-pii / PiiChecker 的
# 编译时 PII flow 分析是**两个独立关注点**。编译时 PII 永远启用（见
# ADR-0009 / P0-1），不受本配置影响。
aster.pii.enforce=${ASTER_PII_ENFORCE:true}

# PII 日志脱敏过滤器（生产环境默认启用）
# 当 aster.pii.enforce=true 时自动脱敏日志中的敏感信息
#
# 注意：Quarkus 没有 `quarkus.log.filter.<class>.enable` 这种通用开关 —
# PIIRedactingLogFilter 通过实现 java.util.logging.Filter 自动激活。
# 若需在运行期关闭，请通过 ASTER_PII_LOG_FILTER 环境变量在
# PIIRedactingLogFilter 实现内部判断。原配置键已被 Quarkus 报为
# "Unrecognized configuration key"。

# GraalVM Native Image 构建配置
# 注意：--allow-incomplete-classpath 在 GraalVM 21+ 已废弃，已移除
quarkus.native.additional-build-args=\
    --initialize-at-build-time=org.objectweb.asm,\
    --initialize-at-run-time=aster.runtime\\,io.micrometer.common.util.internal.logging.Slf4JLoggerFactory,\
    -H:+ReportExceptionStackTraces,\
    -H:+PrintClassInitialization,\
    --enable-native-access=ALL-UNNAMED

# GraphQL UI 在生产环境关闭：always-include=false 即可。
# 注：`quarkus.smallrye-graphql.ui.enable` 在 3.32 已废弃（重复 enable+
# enabled 字段），用 always-include 控制就够了。`ui.path` 和 `http-path`
# 在 3.x 不是 unrecognized 但已被 root-path 取代；保留 always-include
# 作为唯一显式开关。
quarkus.smallrye-graphql.ui.always-include=false
# Endpoint root path（替代旧 `http-path`）。默认就是 /graphql，写出来便于审计。
quarkus.smallrye-graphql.root-path=/graphql
# 生产环境禁用异常详情暴露（开发环境可通过环境变量启用）
quarkus.smallrye-graphql.print-data-fetcher-exception=${GRAPHQL_PRINT_EXCEPTIONS:false}
mp.graphql.showErrorMessage=${GRAPHQL_SHOW_ERROR_MESSAGE:}

# CORS 配置（由 CorsFilter.java 运行时过滤器读取）
# 注意：不使用 quarkus.http.cors.enabled（build-time 属性，部署环境不稳定）
quarkus.http.cors.origins=http://localhost:8081,http://localhost:3000,https://aster-lang.cloud,https://www.aster-lang.cloud,https://aster-lang.dev,https://www.aster-lang.dev
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=accept,authorization,content-type,x-requested-with,x-tenant-id,idempotency-key
quarkus.datasource.devservices.enabled=false

# Database - PostgreSQL (Production)
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USERNAME:postgres}
quarkus.datasource.password=${DB_PASSWORD:postgres}
quarkus.datasource.jdbc.url=${DB_JDBC_URL:jdbc:postgresql://localhost:5432/aster_policy}
# R32 hotfix：原 jdbc.max-size=50 + reactive.max-size=50 = 100 connections
# 上限 per pod。生产 6 replicas × 100 = 600 max requested 远超 postgres
# max_connections=100 → 滚动期间触发 "too many connections" 拒绝新 pod
# 启动。降到 8 + 8 = 16 per pod，6 × 16 = 96 远低 100 cap，仍有 ~5
# 连接 headroom for cron / migrations / 偶发 burst。
# 单 pod 实测 work load 通常 < 8 active connection，min-size 默认 0 让
# idle pod 不占连接。
#
# 注意连接预算：PG max_connections=100，6 pod × (jdbc+reactive) 必须 < 100。
# 默认 8+8=16/pod → 96 总连接。因此**不能**简单调大池——/evaluate 高并发下连接池
# 饱和（k6 500 RPS 下 p99 飙到 892ms、排队等连接）的根治不是扩池，而是让编译缓存命中
# 的热路径**完全不占 DB 连接**（见 PolicyEvaluationService.evaluatePolicyWithKey：命中
# 直接 Truffle 执行，不开 requiringNew() 事务）。env 可在大内存/独立 PG 部署下覆写。
quarkus.datasource.jdbc.max-size=${QUARKUS_DATASOURCE_JDBC_MAX_SIZE:8}
quarkus.datasource.jdbc.min-size=0
quarkus.datasource.jdbc.acquisition-timeout=10
quarkus.datasource.reactive.url=${DB_REACTIVE_URL:postgresql://localhost:5432/aster_policy}
quarkus.datasource.reactive.max-size=${QUARKUS_DATASOURCE_REACTIVE_MAX_SIZE:8}

# 外部 Prisma 数据库（policy-db 多数据源，必须通过环境变量配置）
# ⚠️ 安全警告：不要在此处硬编码凭据，必须使用环境变量或密钥管理服务
quarkus.datasource.policy-db.db-kind=postgresql
quarkus.datasource.policy-db.username=${POLICY_DB_USERNAME:}
quarkus.datasource.policy-db.password=${POLICY_DB_PASSWORD:}
quarkus.datasource.policy-db.jdbc.url=${POLICY_DB_URL:}
quarkus.datasource.policy-db.jdbc.max-size=50
quarkus.datasource.policy-db.jdbc.min-size=10

# Hibernate
# Quarkus 3.x deprecated `quarkus.hibernate-orm.database.generation` in
# favour of `schema-management.strategy`. The semantics are identical
# (`none` keeps Hibernate hands-off so Flyway owns DDL).
quarkus.hibernate-orm.schema-management.strategy=none
workflow.result-futures.ttl-hours=24
quarkus.hibernate-orm.log.sql=false
quarkus.hibernate-orm.sql-load-script=no-file
# Quarkus 3.x JSON 格式化配置 - 使用默认 Jackson 设置，避免与 REST 端点序列化冲突
quarkus.hibernate-orm.mapping.format.global=ignore
# Flyway Migration
quarkus.flyway.migrate-at-start=true
# 注：V6.10.0 曾因"已应用后被修订"导致 checksum 漂移、启动 validate 失败，
# 当时临时开 repair-at-start 自愈（仅同步 schema_history 的 checksum，零 DDL/
# 零数据变更）。该 repair 是一次性的、已在生产执行完成，故此处移除该开关，
# 避免长期开着掩盖未来真实的迁移漂移。若再遇同类 checksum mismatch，应优先
# 排查迁移文件是否被误改，而非常驻 repair。
quarkus.flyway.baseline-on-migrate=true
quarkus.flyway.baseline-version=0
quarkus.flyway.locations=classpath:db/migration
# 迁移治理（GA 收紧，2026-06）：生产数据库必须 fail-fast，不容忍漂移——
#   out-of-order=false：拒绝乱序应用迁移（多人协作时 checksum 漂移的根源）
#   不设 ignore-migration-patterns：缺失/失败的迁移直接报错，而非静默吞掉
# 默认值即为严格（安全默认）；本地 dev / 自动化 test 下放宽，避免开发摩擦。
# 这样生产环境的迁移漂移会在启动时暴露，而不是被宽容配置掩盖到运行期。
quarkus.flyway.out-of-order=false
%dev.quarkus.flyway.out-of-order=true
%test.quarkus.flyway.out-of-order=true
%dev.quarkus.flyway.ignore-migration-patterns=*:missing
%test.quarkus.flyway.ignore-migration-patterns=*:missing

# 动态策略加载 Feature Flag
# 所有策略从数据库读取并动态解析执行，不再使用静态编译的策略
aster.policy.dynamic-loading.enabled=${ASTER_POLICY_DYNAMIC_LOADING_ENABLED:true}

# /evaluate 热路径版本解析缓存 TTL（毫秒）。命中即跳过 findActiveCatalog +
# findActiveVersion 两次 DB 查询和 requiringNew() 事务/连接占用，缓解 jdbc.max-size=8
# 在 k6 高并发下被压满导致的超时。短 TTL 保证发版/回滚很快生效；策略变更也会主动失效。
# 0 = 禁用。
aster.policy.version-cache.ttl-ms=${ASTER_POLICY_VERSION_CACHE_TTL_MS:5000}

# 构建时静态 JAR 生成控制
# 由于已启用动态加载，默认跳过静态策略 JAR 生成
aster.policy.skip-generate-jar=${ASTER_POLICY_SKIP_GENERATE_JAR:true}

# ADR 0015 阶段1：入口选择器兼容开关
# true（默认，过渡期）：显式 functionName="evaluate" 仍按历史「自动入口」哨兵处理
# false：evaluate 不再特殊化，只执行名为 evaluate 的 Rule（不存在则报错）
# 待文档/前端/SDK 全部停止发送 "evaluate" 默认值后切 false
aster.entry.legacy-evaluate-sentinel=${ASTER_ENTRY_LEGACY_EVALUATE_SENTINEL:true}

# ADR 0015 阶段3：跨模块 Use/import resolver + linker 灰度开关。
# 默认关闭，关闭时 evaluate-source 保持历史单模块执行行为。
aster.modules.enabled=${ASTER_MODULES_ENABLED:false}

# Phase 3.4: 异常检测定时任务配置
anomaly.detection.enabled=true
anomaly.detection.cron=${ANOMALY_CRON:0 0 * * * ?}
anomaly.detection.threshold=${ANOMALY_THRESHOLD:0.10}
anomaly.detection.days=${ANOMALY_DAYS:30}
anomaly.detection.retention-days=${ANOMALY_RETENTION:30}

# Inbox 模式配置
inbox.ttl.days=7

# Workflow Snapshot 配置
workflow.snapshot.interval=${WORKFLOW_SNAPSHOT_INTERVAL:100}
workflow.snapshot.time-interval-minutes=${WORKFLOW_SNAPSHOT_TIME_INTERVAL_MINUTES:5}
workflow.snapshot.enabled=${WORKFLOW_SNAPSHOT_ENABLED:true}

# Workflow 调度器防护：防止卡死 workflow 无限消耗资源
workflow.scheduler.max-schedule-count=${WORKFLOW_MAX_SCHEDULE_COUNT:100}
workflow.scheduler.max-running-minutes=${WORKFLOW_MAX_RUNNING_MINUTES:30}

# Truffle 安全架构配置 (Phase 1)
# HMAC 签名验证（生产环境默认启用，开发环境可通过环境变量禁用）
aster.security.signature.enabled=${ASTER_SECURITY_SIGNATURE_ENABLED:true}

# HMAC 密钥配置（必须通过环境变量设置）
# 租户特定密钥: ASTER_HMAC_SECRET_{TENANT_ID}
# 全局密钥: aster.security.hmac.secret-key
aster.security.hmac.use-env-secrets=${ASTER_SECURITY_USE_ENV_SECRETS:true}

# HMAC 轮换 grace period 密钥（可选）
# 凭证轮换期间：current key 验证失败时回退到 previous key；轮换稳定后清空此值
# 租户特定: ASTER_HMAC_PREV_SECRET_{TENANT_ID}
# 全局: aster.security.hmac.previous-secret-key

# Nonce 防重放配置
aster.security.nonce.ttl-minutes=${ASTER_SECURITY_NONCE_TTL:5}

# 安全事件日志配置
aster.security.events.enabled=${ASTER_SECURITY_EVENTS_ENABLED:true}

# RBAC 角色控制配置
aster.security.rbac.enabled=${ASTER_SECURITY_RBAC_ENABLED:true}

# 多租户隔离配置
# 严格格式验证：仅允许字母、数字、连字符、下划线（最长 64 字符）
aster.tenant.strict-format=${ASTER_TENANT_STRICT_FORMAT:true}
# 租户白名单（可选，生产环境推荐启用）
aster.tenant.whitelist.enabled=${ASTER_TENANT_WHITELIST_ENABLED:false}
# 允许的租户列表（逗号分隔）
# aster.tenant.whitelist.tenants=tenant-a,tenant-b,tenant-c

# LLM 集成配置
aster.llm.enabled=${ASTER_LLM_ENABLED:true}
aster.llm.provider=${ASTER_LLM_PROVIDER:openai}
aster.llm.base-url=${ASTER_LLM_BASE_URL:https://api.openai.com}
aster.llm.model=${ASTER_LLM_MODEL:gpt-4o-mini}
aster.llm.temperature=${ASTER_LLM_TEMPERATURE:0.2}
aster.llm.max-tokens=${ASTER_LLM_MAX_TOKENS:2048}
aster.llm.timeout=${ASTER_LLM_TIMEOUT:30s}
aster.llm.read-timeout=${ASTER_LLM_READ_TIMEOUT:120s}
# aster.llm.api-key 通过环境变量 ASTER_LLM_API_KEY 注入（Optional，无默认值）
aster.llm.key-source=${ASTER_LLM_KEY_SOURCE:config}
aster.llm.validation.max-attempts=${ASTER_LLM_VALIDATION_MAX:2}
aster.llm.prompt.base-path=prompts
aster.llm.prompt.default-locale=zh
aster.llm.cache.enabled=${ASTER_LLM_CACHE_ENABLED:true}
aster.llm.cache.ttl=${ASTER_LLM_CACHE_TTL:10m}
aster.llm.cache.max-size=${ASTER_LLM_CACHE_MAX_SIZE:1000}

# ==================== Plan Gate 跨服务 ====================
# 默认 disabled，启用前需要 cloud 暴露 /api/internal/tenant/{id}/plan + 配置 HMAC 共享密钥
aster.plan-gate.enabled=${ASTER_PLAN_GATE_ENABLED:false}
aster.plan-gate.cloud-internal-url=${ASTER_CLOUD_INTERNAL_URL:http://aster-cloud:3000}
# HMAC 共享密钥通过环境变量 ASTER_PLAN_GATE_HMAC_KEY 注入（dev 可缺省）
# 同时被 InternalCallerFilter / ApiKeyAuthFilter / Snapshot 路由复用
aster.plan-gate.hmac-key=${ASTER_PLAN_GATE_HMAC_KEY:}
aster.plan-gate.cache-ttl=${ASTER_PLAN_GATE_CACHE_TTL:PT5M}
aster.plan-gate.cache-max-entries=${ASTER_PLAN_GATE_CACHE_MAX:10000}
# R32 hotfix：原 PT2S 在生产 CF Pages cold function + 首次 DNS/TLS 握手
# 下超时（实测 TimeoutException after first-pod-first-key verify，4-5s
# wall clock）。bump 到 PT10S；cache 命中后这条 timeout 永远不触发，
# 放宽 cold path 不影响稳态延迟。
aster.plan-gate.request-timeout=${ASTER_PLAN_GATE_TIMEOUT:PT10S}
aster.plan-gate.fail-open=${ASTER_PLAN_GATE_FAIL_OPEN:true}

# ==================== Staging Telemetry 工具端点 ====================
# 仅 staging / dev 启用。生产**绝不**开启：会注入合成 NSM 事件污染指标
# 详见 io.aster.policy.rest.StagingTelemetryResource 类注释
aster.staging.telemetry.enabled=${ASTER_STAGING_TELEMETRY_ENABLED:false}

# ==================== Mixpanel NSM 埋点 ====================
# 默认 disabled，生产由 ExternalSecret 注入 token 时同步启用
aster.mixpanel.enabled=${ASTER_MIXPANEL_ENABLED:false}
# token 通过环境变量 ASTER_MIXPANEL_TOKEN 注入（Optional，无默认值）
aster.mixpanel.base-url=${ASTER_MIXPANEL_BASE_URL:https://api.mixpanel.com}
aster.mixpanel.batch-size=${ASTER_MIXPANEL_BATCH_SIZE:50}
aster.mixpanel.flush-interval=${ASTER_MIXPANEL_FLUSH_INTERVAL:PT5S}
aster.mixpanel.queue-capacity=${ASTER_MIXPANEL_QUEUE_CAP:5000}
aster.mixpanel.max-retries=${ASTER_MIXPANEL_MAX_RETRIES:3}
aster.mixpanel.circuit-open-threshold=${ASTER_MIXPANEL_CIRCUIT_THRESHOLD:10}
aster.mixpanel.circuit-cooldown=${ASTER_MIXPANEL_CIRCUIT_COOLDOWN:PT1M}

# 限流配置
aster.ratelimit.enabled=${ASTER_RATELIMIT_ENABLED:true}
# 是否信任转发头作为客户端真实 IP（默认 false=用 socket 源地址，防伪造绕过
# 匿名限流）。开启后客户端 IP 解析优先级：CF-Connecting-IP > XFF 首段 >
# X-Real-IP > socket。
# ⚠️ 生产部署在 Cloudflare Tunnel-only 之后：必须置 true。Cloudflare 对客户端
# 自带的 X-Forwarded-For 是 **追加** 而非覆盖（XFF 首段可伪造），真正可信源是
# 边缘写入的单值 CF-Connecting-IP——代码已优先采用它。不置 true 则匿名请求折叠
# 到 Traefik/tunnel 内网 IP，60/min 退化为全站级限流。仅匿名路径（/schema、
# trial）受影响——已认证请求按租户限流。
# ⚠️ 非 Cloudflare 部署（on-prem 直连/其他反代）若开启，入口必须覆盖 XFF 且
# 清洗客户端传入的 CF-Connecting-IP / X-Real-IP，否则会重新引入 IP 伪造。
# 与 aster.security.trial.trust-forwarded-for 同一信任边界（部署需同时打开）。
aster.ratelimit.trust-forwarded-headers=${ASTER_RATELIMIT_TRUST_FORWARDED_HEADERS:false}
# REST API: 每租户每分钟最大请求数
aster.ratelimit.rest.max-requests=${ASTER_RATELIMIT_REST_MAX:60}
aster.ratelimit.rest.window-seconds=${ASTER_RATELIMIT_REST_WINDOW:60}
# WebSocket: 每 IP 最大并发连接数
aster.ratelimit.ws.max-connections=${ASTER_RATELIMIT_WS_MAX_CONN:5}
# WebSocket: 每会话每秒最大消息数
aster.ratelimit.ws.max-messages-per-second=${ASTER_RATELIMIT_WS_MAX_MSG:10}
# WebSocket: 空闲超时（毫秒，默认 5 分钟）
aster.ratelimit.ws.idle-timeout-ms=${ASTER_RATELIMIT_WS_IDLE_TIMEOUT:300000}

# Worker pool sizing. IMPORTANT: the /evaluate-source OOM caveat
# (docs/perf/README.md) is guarded by its OWN dedicated Semaphore
# (EVAL_SOURCE_PERMITS_COUNT in PolicyEvaluationResource — min of
# CPU-bound 2×cores and heap-bound maxHeap/64MB), NOT by this pool's
# queue size. Heavy Polyglot Context work never gets past that
# semaphore regardless of queue depth.
#
# The DB-backed /evaluate prod path is light per request (version
# resolution + result both cached) and runs its DB/Truffle work on
# this worker pool via runSubscriptionOn. With queue-size=8 the pool
# rejected (RejectedExecutionException "Queue is full" → 5xx) ~20% of
# requests on the slow 2-vCPU CI runner at 500 RPS sustained, even
# though latency stayed <10ms — the queue, not throughput, was the
# ceiling (nightly perf failure). evaluate-source is unaffected
# (semaphore-bounded earlier in the lifecycle).
#
# So we keep max-threads modest (active heavy work is semaphore-capped
# elsewhere) but give the queue real headroom so /evaluate bursts wait
# briefly instead of being rejected. Tunable per deployment via env.
# Bumped 16→32 so the slow 2-vCPU CI runner has enough parallel workers to
# drain 500 RPS of the now-DB-free cached /evaluate path. Heavy eval-source
# work is still semaphore-capped separately, so this doesn't widen the OOM
# surface.
quarkus.thread-pool.max-threads=${QUARKUS_THREAD_POOL_MAX_THREADS:32}
# Core size kept low — workers only allocated above core, so we
# don't waste RAM during the (typical) idle state.
quarkus.thread-pool.core-threads=${QUARKUS_THREAD_POOL_CORE_THREADS:4}
# Queue size — bursts of the lightweight cached /evaluate path queue here as
# cheap Uni waiters (no Polyglot Context held — that's gated by the
# eval-source semaphore). History (all on the slow CI runner @ 500 RPS):
#   8   → too tight, shed 20% as 5xx (RejectedExecutionException).
#   512 → BAD while requests still blocked on the saturated DB pool: a deep
#         queue turned fast-reject into slow-queue (p99 892ms 排队延迟).
#   64  → after the structural DB fix latency was great (p99 5ms) but 64 was
#         still too small → still 20% queue-full reject on slow CI.
# Now that the cached hot path holds NO DB connection, each task drains in
# ~1ms, so a deep queue is safe — it absorbs 500 RPS bursts WITHOUT building
# latency (the 512 latency footgun only existed while tasks blocked on DB).
quarkus.thread-pool.queue-size=${QUARKUS_THREAD_POOL_QUEUE_SIZE:512}

# Marketing-tier trial：旁路 InternalCallerFilter 的 HMAC 要求，仅
# /api/v1/policies/evaluate-source 一条路径，并经过 TrialEndpointGuard
# 二次校验（Origin / body-size / per-IP rate）。默认关闭。
aster.security.evaluate-source.trial.enabled=${ASTER_SECURITY_EVALUATE_SOURCE_TRIAL:false}
aster.security.trial.allowed-origins=${ASTER_SECURITY_TRIAL_ORIGINS:https://aster-lang.dev,https://www.aster-lang.dev,https://aster-lang.cloud,https://www.aster-lang.cloud}
aster.security.trial.max-body-bytes=${ASTER_SECURITY_TRIAL_MAX_BODY:32768}
aster.security.trial.per-ip.minute-max=${ASTER_SECURITY_TRIAL_MINUTE_MAX:10}
aster.security.trial.per-ip.hour-max=${ASTER_SECURITY_TRIAL_HOUR_MAX:60}
aster.security.trial.per-ip.concurrent-max=${ASTER_SECURITY_TRIAL_CONCURRENT_MAX:2}
# fail-closed 默认：不信任转发头。开启后客户端 IP 优先级 CF-Connecting-IP >
# XFF 首段 > X-Real-IP > socket。Cloudflare Tunnel-only 下设 true 安全（CF-
# Connecting-IP 不可伪造）；非 Cloudflare ingress 须始终 *重写* XFF 且清洗客户端
# CF-Connecting-IP/X-Real-IP。与 aster.ratelimit.trust-forwarded-headers 同一
# 信任边界（部署需同时打开，否则 trial per-IP 限流折叠到入口 IP）。
aster.security.trial.trust-forwarded-for=${ASTER_SECURITY_TRIAL_TRUST_XFF:false}
