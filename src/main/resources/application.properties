# encoding: UTF-8
# This file is encoded in UTF-8 to support Chinese comments
quarkus.application.name=aster-policy-api
quarkus.http.port=8080
quarkus.locales=zh-CN,en-US
quarkus.default-locale=zh-CN

quarkus.smallrye-openapi.path=/openapi
quarkus.swagger-ui.always-include=false
quarkus.swagger-ui.path=/swagger-ui

quarkus.health.openapi.included=true

quarkus.micrometer.binder.http-server.enabled=true
quarkus.micrometer.export.prometheus.enabled=true

# OpenTelemetry Tracing Configuration
quarkus.otel.traces.exporter=${OTEL_TRACES_EXPORTER:logging}
quarkus.otel.exporter.otlp.endpoint=${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}
quarkus.otel.service.name=aster-policy-api
quarkus.otel.traces.sampler=${OTEL_TRACES_SAMPLER:always_on}
quarkus.otel.traces.sampler.arg=${OTEL_TRACES_SAMPLER_ARG:1.0}

# 策略结果缓存配置
# 注意：缓存键应包含策略版本哈希，以便策略更新时自动失效
# 仅使用 expire-after-write，避免与 expire-after-access 混用导致的复杂行为
quarkus.cache.caffeine."policy-results".initial-capacity=512
quarkus.cache.caffeine."policy-results".maximum-size=4096
quarkus.cache.caffeine."policy-results".expire-after-write=${CACHE_POLICY_TTL:15M}
quarkus.cache.caffeine."policy-results".metrics-enabled=true
quarkus.redis.hosts=${QUARKUS_REDIS_HOSTS:redis://localhost:6379}
quarkus.redis.max-pool-size=50
quarkus.redis.max-pool-waiting=128
quarkus.cache.redis.expire-after-write=30M
quarkus.cache.redis.prefix=policy-cache
# 修复：使用正确的缓存值类型（PolicyEvaluationResult 而非 EvaluationResponse）
quarkus.cache.redis.policy-results.value-type=io.aster.policy.api.model.PolicyEvaluationResult
quarkus.cache.redis.idempotency-keys.value-type=java.lang.String

quarkus.cache.caffeine."idempotency-keys".maximum-size=10000
quarkus.cache.caffeine."idempotency-keys".expire-after-write=1h

# Phase 3.4: 版本使用统计缓存配置
quarkus.cache.caffeine."version-usage-stats".expire-after-write=15M
quarkus.cache.caffeine."version-usage-stats".maximum-size=1000
quarkus.cache.caffeine."version-usage-stats".metrics-enabled=true

quarkus.log.level=INFO
quarkus.log.category."io.aster".level=DEBUG
quarkus.log.console.format=%d{HH:mm:ss} %-5p [%c{2.}] (%t) %s%e%n

# PII 保护配置（生产环境默认启用）
# - aster.pii.enforce=true: 启用 PII 保护（默认）
# - aster.pii.enforce=false: 禁用 PII 保护（仅开发环境）
# 与 TypeScript 编译器的 ENFORCE_PII 环境变量保持一致
aster.pii.enforce=${ASTER_PII_ENFORCE:true}

# PII 日志脱敏过滤器（生产环境默认启用）
# 当 aster.pii.enforce=true 时自动脱敏日志中的敏感信息
quarkus.log.filter."io.aster.policy.logging.PIIRedactingLogFilter".enable=${ASTER_PII_LOG_FILTER:true}

# GraalVM Native Image 构建配置
# 注意：--allow-incomplete-classpath 在 GraalVM 21+ 已废弃，已移除
quarkus.native.additional-build-args=\
    --initialize-at-build-time=org.objectweb.asm,\
    --initialize-at-run-time=aster.runtime\\,io.micrometer.common.util.internal.logging.Slf4JLoggerFactory,\
    -H:+ReportExceptionStackTraces,\
    -H:+PrintClassInitialization,\
    --enable-native-access=ALL-UNNAMED

quarkus.smallrye-graphql.ui.always-include=false
quarkus.smallrye-graphql.ui.enable=false
quarkus.smallrye-graphql.ui.path=/graphql-ui
quarkus.smallrye-graphql.http-path=/graphql
# 生产环境禁用异常详情暴露（开发环境可通过环境变量启用）
quarkus.smallrye-graphql.print-data-fetcher-exception=${GRAPHQL_PRINT_EXCEPTIONS:false}
mp.graphql.showErrorMessage=${GRAPHQL_SHOW_ERROR_MESSAGE:}

quarkus.http.cors.enabled=true
quarkus.http.cors.origins=http://localhost:8081,http://localhost:3000,https://aster-lang.cloud,https://www.aster-lang.cloud
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=accept,authorization,content-type,x-requested-with,x-tenant-id,idempotency-key
quarkus.datasource.devservices.enabled=false

# Database - PostgreSQL (Production)
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USERNAME:postgres}
quarkus.datasource.password=${DB_PASSWORD:postgres}
quarkus.datasource.jdbc.url=${DB_JDBC_URL:jdbc:postgresql://localhost:5432/aster_policy}
quarkus.datasource.jdbc.max-size=50
quarkus.datasource.jdbc.acquisition-timeout=10
quarkus.datasource.reactive.url=${DB_REACTIVE_URL:postgresql://localhost:5432/aster_policy}
quarkus.datasource.reactive.max-size=50

# 外部 Prisma 数据库（policy-db 多数据源，必须通过环境变量配置）
# ⚠️ 安全警告：不要在此处硬编码凭据，必须使用环境变量或密钥管理服务
quarkus.datasource.policy-db.db-kind=postgresql
quarkus.datasource.policy-db.username=${POLICY_DB_USERNAME:}
quarkus.datasource.policy-db.password=${POLICY_DB_PASSWORD:}
quarkus.datasource.policy-db.jdbc.url=${POLICY_DB_URL:}
quarkus.datasource.policy-db.jdbc.max-size=50
quarkus.datasource.policy-db.jdbc.min-size=10

# Hibernate
quarkus.hibernate-orm.database.generation=none
workflow.result-futures.ttl-hours=24
quarkus.hibernate-orm.log.sql=false
quarkus.hibernate-orm.sql-load-script=no-file
# Quarkus 3.x JSON 格式化配置 - 使用默认 Jackson 设置，避免与 REST 端点序列化冲突
quarkus.hibernate-orm.mapping.format.global=ignore
# Flyway Migration
quarkus.flyway.migrate-at-start=true
quarkus.flyway.baseline-on-migrate=true
quarkus.flyway.baseline-version=0
quarkus.flyway.locations=classpath:db/migration
quarkus.flyway.out-of-order=true
quarkus.flyway.repair-at-start=true
quarkus.flyway.ignore-migration-patterns=*:missing

# 动态策略加载 Feature Flag
# 所有策略从数据库读取并动态解析执行，不再使用静态编译的策略
aster.policy.dynamic-loading.enabled=${ASTER_POLICY_DYNAMIC_LOADING_ENABLED:true}

# 构建时静态 JAR 生成控制
# 由于已启用动态加载，默认跳过静态策略 JAR 生成
aster.policy.skip-generate-jar=${ASTER_POLICY_SKIP_GENERATE_JAR:true}

# Phase 3.4: 异常检测定时任务配置
anomaly.detection.enabled=true
anomaly.detection.cron=${ANOMALY_CRON:0 0 * * * ?}
anomaly.detection.threshold=${ANOMALY_THRESHOLD:0.10}
anomaly.detection.days=${ANOMALY_DAYS:30}
anomaly.detection.retention-days=${ANOMALY_RETENTION:30}

# Inbox 模式配置
inbox.ttl.days=7

# Workflow Snapshot 配置
workflow.snapshot.interval=${WORKFLOW_SNAPSHOT_INTERVAL:100}
workflow.snapshot.time-interval-minutes=${WORKFLOW_SNAPSHOT_TIME_INTERVAL_MINUTES:5}
workflow.snapshot.enabled=${WORKFLOW_SNAPSHOT_ENABLED:true}

# Workflow 调度器防护：防止卡死 workflow 无限消耗资源
workflow.scheduler.max-schedule-count=${WORKFLOW_MAX_SCHEDULE_COUNT:100}
workflow.scheduler.max-running-minutes=${WORKFLOW_MAX_RUNNING_MINUTES:30}

# Truffle 安全架构配置 (Phase 1)
# HMAC 签名验证（生产环境默认启用，开发环境可通过环境变量禁用）
aster.security.signature.enabled=${ASTER_SECURITY_SIGNATURE_ENABLED:true}

# HMAC 密钥配置（必须通过环境变量设置）
# 租户特定密钥: ASTER_HMAC_SECRET_{TENANT_ID}
# 全局密钥: aster.security.hmac.secret-key
aster.security.hmac.use-env-secrets=${ASTER_SECURITY_USE_ENV_SECRETS:true}

# Nonce 防重放配置
aster.security.nonce.ttl-minutes=${ASTER_SECURITY_NONCE_TTL:5}

# 安全事件日志配置
aster.security.events.enabled=${ASTER_SECURITY_EVENTS_ENABLED:true}

# RBAC 角色控制配置
aster.security.rbac.enabled=${ASTER_SECURITY_RBAC_ENABLED:true}

# 多租户隔离配置
# 严格格式验证：仅允许字母、数字、连字符、下划线（最长 64 字符）
aster.tenant.strict-format=${ASTER_TENANT_STRICT_FORMAT:true}
# 租户白名单（可选，生产环境推荐启用）
aster.tenant.whitelist.enabled=${ASTER_TENANT_WHITELIST_ENABLED:false}
# 允许的租户列表（逗号分隔）
# aster.tenant.whitelist.tenants=tenant-a,tenant-b,tenant-c

# LLM 集成配置
aster.llm.enabled=${ASTER_LLM_ENABLED:true}
aster.llm.provider=${ASTER_LLM_PROVIDER:openai}
aster.llm.base-url=${ASTER_LLM_BASE_URL:https://api.openai.com}
aster.llm.model=${ASTER_LLM_MODEL:gpt-4o-mini}
aster.llm.temperature=${ASTER_LLM_TEMPERATURE:0.2}
aster.llm.max-tokens=${ASTER_LLM_MAX_TOKENS:2048}
aster.llm.timeout=${ASTER_LLM_TIMEOUT:30s}
aster.llm.read-timeout=${ASTER_LLM_READ_TIMEOUT:120s}
# aster.llm.api-key 通过环境变量 ASTER_LLM_API_KEY 注入（Optional，无默认值）
aster.llm.key-source=${ASTER_LLM_KEY_SOURCE:config}
aster.llm.validation.max-attempts=${ASTER_LLM_VALIDATION_MAX:2}
aster.llm.prompt.base-path=prompts
aster.llm.prompt.default-locale=zh
aster.llm.cache.enabled=${ASTER_LLM_CACHE_ENABLED:true}
aster.llm.cache.ttl=${ASTER_LLM_CACHE_TTL:10m}
aster.llm.cache.max-size=${ASTER_LLM_CACHE_MAX_SIZE:1000}

# 限流配置
aster.ratelimit.enabled=${ASTER_RATELIMIT_ENABLED:true}
# REST API: 每租户每分钟最大请求数
aster.ratelimit.rest.max-requests=${ASTER_RATELIMIT_REST_MAX:60}
aster.ratelimit.rest.window-seconds=${ASTER_RATELIMIT_REST_WINDOW:60}
# WebSocket: 每 IP 最大并发连接数
aster.ratelimit.ws.max-connections=${ASTER_RATELIMIT_WS_MAX_CONN:5}
# WebSocket: 每会话每秒最大消息数
aster.ratelimit.ws.max-messages-per-second=${ASTER_RATELIMIT_WS_MAX_MSG:10}
# WebSocket: 空闲超时（毫秒，默认 5 分钟）
aster.ratelimit.ws.idle-timeout-ms=${ASTER_RATELIMIT_WS_IDLE_TIMEOUT:300000}
