# encoding: UTF-8
# 外部 Prisma 数据库集成测试配置
# DATABASE_URL="postgres://e3f72fa01fd9162d59db1cfedf07eda4b3a22066d49a7f0c8a24e59dc9d60783:sk_Ar-rybuz8VOO-5VLtjZf9@db.prisma.io:5432/postgres?sslmode=require"

# 外部 Prisma PostgreSQL 数据库
quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=jdbc:postgresql://db.prisma.io:5432/postgres?sslmode=require
quarkus.datasource.username=e3f72fa01fd9162d59db1cfedf07eda4b3a22066d49a7f0c8a24e59dc9d60783
quarkus.datasource.password=sk_Ar-rybuz8VOO-5VLtjZf9
quarkus.datasource.reactive.url=postgresql://db.prisma.io:5432/postgres?sslmode=require
quarkus.datasource.jdbc.max-size=20
quarkus.datasource.reactive.max-size=20

# 连接超时配置（外部数据库可能延迟较高）
quarkus.datasource.jdbc.acquisition-timeout=30

# Hibernate
quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.log.sql=true
quarkus.hibernate-orm.sql-load-script=no-file
# 修复 JSON 格式化冲突
quarkus.hibernate-orm.mapping.format.global=ignore

# Flyway Migration（在外部数据库上创建 Quarkus 所需表）
quarkus.flyway.migrate-at-start=true
quarkus.flyway.baseline-on-migrate=true
quarkus.flyway.baseline-version=0
quarkus.flyway.locations=classpath:db/migration
# 不清理数据库，保留现有 Prisma 表
quarkus.flyway.clean-at-start=false

# Cache - 简化配置
quarkus.cache.caffeine."policy-results".expire-after-write=3M
quarkus.cache.redis.policy-results.value-type=io.aster.policy.api.model.PolicyEvaluationResult
quarkus.redis.hosts=redis://localhost:6379
quarkus.redis.timeout=1s

# 禁用调度器
quarkus.scheduler.enabled=false

# Log Level
quarkus.log.level=INFO
quarkus.log.category."io.aster".level=DEBUG
quarkus.log.category."org.flywaydb".level=DEBUG

# PII 保护配置
aster.pii.enforce=false

# 动态策略加载
aster.policy.dynamic-loading.enabled=true
