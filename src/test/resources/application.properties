# encoding: UTF-8
# This file is encoded in UTF-8 to support Chinese comments
# Test Configuration - Testcontainers PostgreSQL (Podman)

# Database 配置：由 PostgresTestResource (Testcontainers) 动态提供
# 以下为默认值，会被 Testcontainers 覆盖
quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.max-size=50
quarkus.datasource.reactive.max-size=50

# 连接超时配置
quarkus.datasource.jdbc.acquisition-timeout=10

# Hibernate
quarkus.hibernate-orm.schema-management.strategy=none
quarkus.hibernate-orm.log.sql=true
quarkus.hibernate-orm.sql-load-script=no-file
# 修复 JSON 格式化冲突
quarkus.hibernate-orm.mapping.format.global=ignore

# Flyway Migration（指向 PostgreSQL 脚本）
quarkus.flyway.migrate-at-start=true
quarkus.flyway.baseline-on-migrate=true
quarkus.flyway.baseline-version=0
quarkus.flyway.locations=classpath:db/migration,classpath:db/seed
quarkus.flyway.clean-at-start=true

# Cache - 测试环境仅使用 Caffeine 本地缓存，避免 Redis 依赖
# 使用明确的 Caffeine 后端类型以确保 PolicyCacheManager 正确初始化
quarkus.cache.type=caffeine
quarkus.cache.caffeine."policy-results".expire-after-write=3M
quarkus.cache.caffeine."policy-results".initial-capacity=100
quarkus.cache.caffeine."policy-results".maximum-size=1000

# Redis 配置保留用于集成测试，但默认禁用
# 当需要 Redis 时，使用 @RedisEnabledTest 启用 RedisTestResource
quarkus.redis.max-pool-size=50
quarkus.redis.max-pool-waiting=128
quarkus.redis.hosts=redis://localhost:6379
quarkus.redis.client-type=standalone
quarkus.redis.timeout=1s

# 禁用调度器以避免测试并行触发 Timer 导致重复事件
quarkus.scheduler.enabled=false

# Enable Redis Testcontainer for all tests
quarkus.test.integration-test-profile=redis-enabled

# Log Level
quarkus.log.level=INFO
quarkus.log.category."io.aster".level=DEBUG
quarkus.log.category."org.flywaydb".level=DEBUG

# PII 保护配置（默认禁用）
aster.pii.enforce=false

# 签名验证配置（测试环境禁用）
aster.security.signature.enabled=false

# RBAC 角色验证配置（测试环境禁用）
aster.security.rbac.enabled=false

# API Key 鉴权（测试环境禁用，单元测试中单独验证）
aster.security.apikey.enabled=false

# 限流配置（测试环境禁用，单元测试中单独验证）
aster.ratelimit.enabled=false

# Workflow 调度器防护（测试环境）
workflow.scheduler.polling.enabled=false
workflow.scheduler.max-schedule-count=100
workflow.scheduler.max-running-minutes=30

# 双写机制配置（Phase 1.3 临时兜底）
aster.policy.dual-write.enabled=${ASTER_POLICY_DUAL_WRITE_ENABLED:true}

# 动态加载配置（需要数据库中有策略种子数据）
# 在测试中使用 V99 迁移种子数据来填充策略
aster.policy.dynamic-loading.enabled=true

# GraphQL 错误消息配置（测试环境显示完整错误消息）
mp.graphql.showErrorMessage=*
quarkus.smallrye-graphql.print-data-fetcher-exception=true
